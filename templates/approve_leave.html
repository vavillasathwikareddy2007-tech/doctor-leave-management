<!DOCTYPE html>

<html>

<head>

    <title>Approve Leave</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="dashboard-container">

    <h1>Approve Leave Requests</h1>
    <div class="menu-bar">

    <a href="/dashboard"><button>Dashboard</button></a>

    <a href="/approve_leave"><button>Approve Leave</button></a>

    <a href="/emergency"><button>Emergency</button></a>

    <a href="/roster"><button>Weekly Roster</button></a>

    <a href="/inactive_doctors"><button>Inactive Doctors</button></a>

</div>

<br><br>

    <div class="section-box">

        <table border="1" cellpadding="10" width="100%">

    <tr>

        <th>ID</th>
        <th>Doctor Name</th>
        <th>Department</th>
        <th>Shift</th>
        <th>Leave Date</th>
        <th>Reason</th>
        <th>Status</th>
        <th>Action</th>

    </tr>

    {% for leave in leaves %}

    <tr>

        <td>{{ leave[0] }}</td>
        <td>{{ leave[1] }}</td>
        <td>{{ leave[2] }}</td>
        <td>{{ leave[3] }}</td>
        <td>{{ leave[4] }}</td>
        <td>{{ leave[5] }}</td>
        <td>{{ leave[6] }}</td>

        <td>

            <a href="/approve/{{ leave[0] }}">

                <button>Approve</button>

            </a>

            <br><br>

            <a href="/reject/{{ leave[0] }}">

                <button>Reject</button>

            </a>

        </td>

    </tr>

    {% endfor %}

</table>
    </div>

</div>

</body>

</html>
